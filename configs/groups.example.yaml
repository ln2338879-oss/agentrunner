profiles:
  - id: game-dev
    name: Game Development
    description: Game planning, implementation, content generation, design, and review.
    defaultWorkflow: plan-build-review
    skills:
      - code-style
    policy:
      allowCodeChanges: true
      allowContentGeneration: true
      allowFileWrites: true
      allowShellCommands: true
      allowTests: true
      allowBuilds: true
      allowApprovedTaskCommand: true
      allowSystemdRestart: false
      allowNetworkAccess: false
      requireDirectorReview: true
      requireHumanApprovalFor:
        - systemd_restart

  - id: content-lab
    name: Content Lab
    description: Content, data, asset, image, and writing generation without code changes.
    defaultWorkflow: plan-generate-review
    skills:
      - content-style
    policy:
      allowCodeChanges: false
      allowContentGeneration: true
      allowFileWrites: true
      allowShellCommands: false
      allowTests: false
      allowBuilds: false
      allowApprovedTaskCommand: false
      allowSystemdRestart: false
      allowNetworkAccess: false
      requireDirectorReview: true
      requireHumanApprovalFor: []

  - id: design-lab
    name: Design Lab
    description: Visual design and image generation workspace.
    defaultWorkflow: plan-design-review
    skills:
      - content-style
    policy:
      allowCodeChanges: false
      allowContentGeneration: true
      allowFileWrites: true
      allowShellCommands: false
      allowTests: false
      allowBuilds: false
      allowApprovedTaskCommand: false
      allowSystemdRestart: false
      allowNetworkAccess: false
      requireDirectorReview: true
      requireHumanApprovalFor: []

  - id: software-dev
    name: Software Development
    description: General coding and automation workflow.
    defaultWorkflow: plan-build-review
    skills:
      - code-style
    policy:
      allowCodeChanges: true
      allowContentGeneration: false
      allowFileWrites: true
      allowShellCommands: true
      allowTests: true
      allowBuilds: true
      allowApprovedTaskCommand: true
      allowSystemdRestart: false
      allowNetworkAccess: false
      requireDirectorReview: true
      requireHumanApprovalFor:
        - approved_task_command
        - systemd_restart

groups:
  - id: runebound-dev
    name: Runebound Development
    profileId: game-dev
    workspaceId: runebound
    workspaceName: Runebound
    discordChannelIds:
      - "000000000000000000"
    projectRoot: /opt/game-projects/runebound
    obsidianVaultPath: /opt/obsidian-vaults/AgentRunnerVault
    artifactRoot: /opt/obsidian-vaults/AgentRunnerVault
    factoryModel: gemma
    builderTestCommand: bun test
    builderBuildCommand: bun run build
    allowedRoles:
      - director
      - builder
      - factory
      - designer
    skills:
      - runebound-design
      - item-schema
    policy:
      allowCodeChanges: true
      allowContentGeneration: true
      requireDirectorReview: true
      requireHumanApprovalFor:
        - approved_task_command

  - id: content-lab
    name: Content Factory Lab
    profileId: content-lab
    workspaceId: runebound-content
    workspaceName: Runebound Content Lab
    discordChannelIds:
      - "111111111111111111"
    projectRoot: /opt/game-projects/runebound
    obsidianVaultPath: /opt/obsidian-vaults/AgentRunnerVault
    factoryModel: gemma
    allowedRoles:
      - director
      - factory
      - designer
    skills:
      - monster-schema
    policy:
      allowCodeChanges: false
      allowContentGeneration: true
      requireDirectorReview: true

  - id: design-lab
    name: Visual Design Lab
    profileId: design-lab
    workspaceId: visual-design
    workspaceName: Visual Design Lab
    discordChannelIds:
      - "222222222222222222"
    projectRoot: /opt/design-projects
    obsidianVaultPath: /opt/obsidian-vaults/AgentRunnerVault
    allowedRoles:
      - director
      - designer
    skills:
      - visual-style
    policy:
      allowCodeChanges: false
      allowContentGeneration: true
      requireDirectorReview: true
