name: AgentRunner Runtime Proof

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - test/**
      - scripts/**
      - package.json
      - bun.lock
      - bun.lockb
      - tsconfig.json
      - .github/workflows/**

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run proof
        run: bun run proof
      - name: Upload proof report
        uses: actions/upload-artifact@v4
        with:
          name: agentrunner-runtime-proof
          path: docs/proof/runtime-proof.md
          if-no-files-found: error
          retention-days: 7
