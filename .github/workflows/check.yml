name: AgentRunner Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Bun
        run: npm i -g bun

      - name: Install dependencies
        run: bun install --frozen-lockfile --silent

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: bun run typecheck --pretty false > typecheck.log 2>&1

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log

      - name: Fail on typecheck errors
        if: steps.typecheck.outcome == 'failure'
        run: cat typecheck.log && exit 1

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        id: test
        continue-on-error: true
        run: bun test > test.log 2>&1

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log

      - name: Fail on test errors
        if: steps.test.outcome == 'failure'
        run: cat test.log && exit 1

      - name: Build
        run: bun run build
